server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/presidency_backend?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Africa/Libreville
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  storage:
    root: uploads
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:8081
      - http://localhost:19006
  security:
    jwt-secret: change-this-secret-key-before-production-2026-mvet-service-platform
    jwt-expiration: 86400000
